name: CI/CD Pipeline
on: [push, pull_request]
permissions:
  id-token: write
  contents: read
jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - name: Build and Test
        run: mvn clean verify
      - name: Build Docker image
        run: docker build -t mc-gateway-transaction-api .
  deploy:
    needs: build-and-test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::447558490768:role/mastercard-msbx-github-deploy
          aws-region: us-west-2
      - uses: aws-actions/amazon-ecr-login@v2
      - run: docker build -t 447558490768.dkr.ecr.us-west-2.amazonaws.com/mastercard/mc-gateway:latest .
      - run: docker push 447558490768.dkr.ecr.us-west-2.amazonaws.com/mastercard/mc-gateway:latest